name: Docker Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  # Every main commit gets an immutable candidate. Do not cancel an older
  # build merely because another direct push follows it.
  group: docker-publish-${{ github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    # Candidate publication runs in parallel with the required main checks.
    # Production tooling separately refuses this digest until every required
    # check for this exact SHA has succeeded.
    if: ${{ github.ref_protected }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    env:
      HEAD_SHA: ${{ github.sha }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout verified commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/$(printf '%s' "$REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set source metadata
        id: source
        shell: bash
        run: |
          set -euo pipefail
          actual_sha=$(git rev-parse HEAD)
          if [ "$actual_sha" != "$HEAD_SHA" ]; then
            echo "Checked out $actual_sha, expected $HEAD_SHA" >&2
            exit 1
          fi
          {
            echo "sha=$actual_sha"
            echo "date=$(git show -s --format=%cI HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: tags
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        shell: bash
        run: |
          {
            echo 'tags<<EOF'
            echo "${IMAGE_NAME}:sha-${HEAD_SHA}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            COMMIT=${{ steps.source.outputs.sha }}
            DATE=${{ steps.source.outputs.date }}
            SOURCE_URL=https://github.com/${{ github.repository }}
          labels: |
            org.opencontainers.image.created=${{ steps.source.outputs.date }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Verify pushed image
        id: verify
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          image_ref="${IMAGE_NAME}@${IMAGE_DIGEST}"
          docker pull "$image_ref"
          image_revision=$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$image_ref")
          if [ "$image_revision" != "$SOURCE_SHA" ]; then
            echo "Image revision $image_revision does not match source $SOURCE_SHA" >&2
            exit 1
          fi
          docker run --rm --network none --entrypoint /app/sub2api "$image_ref" --version
          docker run --rm --network none --entrypoint /bin/sh "$image_ref" \
            -c 'test -s /app/resources/model-pricing/model_prices_and_context_window.json'
          binary_sha256=$(docker run --rm --network none --entrypoint sha256sum \
            "$image_ref" /app/sub2api | awk '{print $1}')
          test "${#binary_sha256}" -eq 64
          echo "binary_sha256=$binary_sha256" >> "$GITHUB_OUTPUT"

      - name: Write immutable Gateway coordinates
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          BINARY_SHA256: ${{ steps.verify.outputs.binary_sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          image = os.environ["IMAGE_NAME"]
          digest = os.environ["IMAGE_DIGEST"]
          document = {
              "coordinate_schema_version": 1,
              "repository": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}",
              "source_commit": os.environ["SOURCE_SHA"],
              "image": f"{image}@{digest}",
              "image_digest": digest,
              "binary_sha256": os.environ["BINARY_SHA256"],
              "architecture": "amd64",
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
          }
          Path("gateway-coordinate.json").write_text(
              json.dumps(document, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload immutable Gateway coordinates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gateway-coordinate-${{ github.sha }}
          path: gateway-coordinate.json
          if-no-files-found: error
          retention-days: 30

      - name: Publish deployment coordinates
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        shell: bash
        run: |
          {
            echo '## Production image candidate'
            echo
            echo "- Source commit: \`$SOURCE_SHA\`"
            echo "- Image digest: \`$IMAGE_DIGEST\`"
            echo "- Deploy reference: \`${IMAGE_NAME}@${IMAGE_DIGEST}\`"
            echo "- Coordinate artifact: \`gateway-coordinate-${SOURCE_SHA}\`"
            echo '- Production eligibility: pending exact-SHA required checks'
          } >> "$GITHUB_STEP_SUMMARY"
